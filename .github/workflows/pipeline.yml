name: Pipeline CI

on:
  push:
    branches: [main]
    paths:
      - 'data-pipeline/**'
      - '.github/workflows/pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'data-pipeline/**'

jobs:
  test-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Run unit tests
        run: pytest data-pipeline/tests/ -v --tb=short

